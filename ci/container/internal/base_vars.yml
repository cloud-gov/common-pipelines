base-image: ubuntu-hardened-stig
base-image-tag: latest
oci-build-params: {}
common-pipelines-trigger: false
dockerfile-path: []
dockerfile-trigger: false
static-analysis-cmd: echo
static-analysis-args:
  [
    "No static analysis command configured. Set static-analysis-cmd and static-analysis-args in your pipeline configuration file to run static analysis on your source code.",
  ]
build-test-cmd: echo
build-test-args:
  [
    "No build test command configured. Set build-test-cmd and build-test-args in your pipeline configuration file to run tests",
  ]
build-test-params: {}
src-branch: main
src-trigger: false
tailoring-file: common-pipelines/container/tailor-stig.xml
daily-scan-time: "0 2 * * *"
grype-path: common-pipelines/container/grype.yaml

# Integration test configuration
integration-test-cmd: echo
integration-test-args:
  - "No integration test configured. Set integration-test-cmd and integration-test-args in your vars.yml to enable integration testing."

# Concourse context validation
enable-concourse-validation: "false"  # Set to "true" to enable Concourse-specific validation
